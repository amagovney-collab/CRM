<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#030b18;font-family:'Outfit',sans-serif;color:#f1f5f9;overflow:hidden}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

input,select,textarea,button{font-family:'Outfit',sans-serif;-webkit-appearance:none;outline:none;border:none}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto}
#view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 80px}
#nav{display:flex;background:#060f1e;border-top:1px solid #1a2744;padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom));flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:#334155;cursor:pointer;padding:4px 0}
.nb.on{color:#2563eb}
.nb svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pt{font-size:18px;font-weight:800;color:#f8fafc}

.sl{font-size:9px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;font-weight:700;border-radius:8px;font-size:12px;padding:9px 14px;border:none;transition:opacity .15s}
.bp{background:#2563eb;color:#fff}
.bg{background:transparent;color:#64748b;border:1px solid #1e293b}

.bw{width:100%}

.inp{width:100%;background:#0a1220;border:1px solid #1e293b;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:13px}
.sel{width:100%;background:#0a1220;border:1px solid #1e293b;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:13px}
.tex{width:100%;background:#0a1220;border:1px solid #1e293b;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:13px;resize:vertical;min-height:70px}
.inp:focus,.sel:focus,.tex:focus{border-color:#2563eb}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 10px}
.pill{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid #1a2744;background:#0a1220;color:#475569;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none}
.pill.on{background:#1e3a5f;border-color:#2563eb;color:#60a5fa}
.prow{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.prow::-webkit-scrollbar{display:none}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.tag{display:inline-block;padding:2px 7px;border-radius:12px;font-size:9px;font-weight:700;background:#0f2040;color:#60a5fa}
.row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #0a1220;cursor:pointer}
.row:last-child{border-bottom:none}
.barw{flex:1;background:#0a1220;border-radius:3px;height:6px;overflow:hidden}
.barf{height:100%;border-radius:3px;transition:width .4s}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#030b18;border:1px solid #1a2744;border-radius:16px 16px 0 0;width:100%;max-width:430px;max-height:90vh;display:flex;flex-direction:column}
.mh{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #0a1220;flex-shrink:0}
.mh h3{font-size:15px;font-weight:700;color:#f1f5f9}
.mc{font-size:22px;color:#475569;cursor:pointer;background:none;padding:0 4px;line-height:1}
.mb{padding:18px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.hero{background:linear-gradient(135deg,#060f1e,#0a1628);border:1px solid #1a2744;border-radius:12px;padding:16px;margin-bottom:12px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.kpi{background:#060f1e;border:1px solid #1a2744;border-radius:9px;padding:10px;text-align:center}
.kv{font-size:22px;font-weight:800}
.kl{font-size:9px;font-weight:700;color:#334155;text-transform:uppercase;margin-top:1px}
.qi{background:#060f1e;border:1px solid #1a2744;border-radius:9px;padding:11px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.qdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:2px solid #1a2744;background:#0a1220;color:#334155}
.sdot.done{background:#14532d;border-color:#15803d;color:#86efac}
.sdot.cur{border-color:#2563eb;color:#60a5fa;background:#0f2040}
.sline{width:1px;height:12px;background:#1a2744;margin-left:13px}
.cnext{background:#0f2040;border:1px solid #1e3a5f;border-radius:8px;padding:12px;margin-bottom:12px}
.pbs{margin-bottom:14px}
.pbs h4{font-size:12px;font-weight:700;color:#f1f5f9;margin-bottom:6px;border-left:3px solid #2563eb;padding-left:8px}
.pbb{background:#0a1220;border-radius:7px;padding:11px;font-size:11px;line-height:1.85;color:#94a3b8;white-space:pre-wrap}
.rs{border-left:3px solid #2563eb;padding-left:9px;margin-bottom:13px}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.fade{animation:fi .18s ease}
.sw{position:relative;margin-bottom:12px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:#475569;fill:none;stroke-width:2}

<script>
// ─── CONSTANTS ────────────────────────────────────────────
var STAGES=["Target","Prospecting","Connected","Discovery","Demo","Proposal","Negotiation","Closed Won","Closed Lost"];
var VERTS=["Manufacturing","Healthcare","Technology","Hospitality","Financial Services","Construction","Education","Nonprofit","Auto Dealership","Professional Services","Real Estate","Winery/Bev","Senior Living","Distribution","Other"];
var PRODS=["Workforce Now (HCM)","TotalSource (PEO)","Retirement/401k","Workers Comp Pay-by-Pay","Health Insurance","Time & Attendance","HR Pro Advisory","Wage Garnishment","Background Screening"];
var SC={Target:"#334155",Prospecting:"#1e40af",Connected:"#0891b2",Discovery:"#7c3aed",Demo:"#9333ea",Proposal:"#c2410c",Negotiation:"#b45309","Closed Won":"#15803d","Closed Lost":"#991b1b"};
var TC={1:"#ef4444",2:"#f59e0b",3:"#6b7280"};
var AI={call:"📞",email:"📧",drop:"🚶",meeting:"🤝",demo:"💻",linkedin:"💼",note:"📝"};
var AC={call:"#10b981",email:"#2563eb",drop:"#f97316",meeting:"#a855f7",demo:"#ef4444",linkedin:"#0ea5e9",note:"#f59e0b"};
var CTITLES={Manufacturing:["VP Human Resources","HR Director","Controller","CFO","Office Manager"],Healthcare:["Practice Administrator","Office Manager","HR Director","CFO","Controller"],Technology:["VP People","Chief People Officer","CFO","Controller","COO"],Hospitality:["General Manager","HR Manager","Controller","CFO"],Construction:["CFO","Controller","HR Manager","VP Operations","Office Manager"],"Financial Services":["COO","CFO","Managing Partner","HR Director"],Education:["Superintendent","Business Administrator","HR Director","CFO"],"Auto Dealership":["Dealer Principal","General Manager","Controller","HR Manager"],"Professional Services":["Managing Partner","HR Director","CFO","Controller"],"Senior Living":["Executive Director","HR Director","Administrator","CFO"],Default:["HR Director","CFO","Controller","Office Manager","VP Operations"]};
var DEF_CAD=[
  {day:1,type:"drop",label:"In-Person Drop",desc:"Walk in, ask for DM by name. Get receptionist name. Leave branded leave-behind."},
  {day:1,type:"email",label:"Same-Day Email",desc:"Subject: Stopped by today - [Company]. Short, warm, end with calendar ask."},
  {day:2,type:"call",label:"Morning Call",desc:"Call before 9am or after 4pm. Reference drop and email. Leave voicemail if no answer."},
  {day:4,type:"linkedin",label:"LinkedIn Connect",desc:"Send connection request. Personalized note under 280 chars."},
  {day:5,type:"email",label:"Value Email",desc:"Send relevant insight - compliance update or vertical stat. No pitch. Pure value."},
  {day:7,type:"call",label:"Follow-Up Call 2",desc:"Second attempt. Different time of day. Reference value email."},
  {day:10,type:"email",label:"Case Study Email",desc:"2 sentences about a similar Rochester company you helped. Specific and relatable."},
  {day:14,type:"call",label:"Call 3 - Direct Ask",desc:"Ask: Is this bad timing, or is payroll not a priority? Force a yes or no."},
  {day:17,type:"linkedin",label:"LinkedIn Engage",desc:"Comment on their post or send InMail with a specific company insight."},
  {day:21,type:"email",label:"Break-Up Email",desc:"I will stop being a pest. If things change, I am here. This triggers replies."},
  {day:30,type:"call",label:"30-Day Re-Engage",desc:"New angle - company news, new ADP product, or upcoming compliance deadline."}
];

// ─── STORAGE ─────────────────────────────────────────────
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ld(k,d){try{var r=localStorage.getItem(k);return r!==null?JSON.parse(r):d;}catch(e){return d;}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ─── STATE ───────────────────────────────────────────────
var accts=[], acts=[], cads=[], ccads=[];
var vw='dash', curAcct=null, mstack=[];
var afProds=[];
var acctQ='', acctFS='All', acctFT='All', acctFH='All';
var pbKey='paychex', acctTab='overview';

function initData(){
  accts=ld('crm3_accts',[]);
  acts=ld('crm3_acts',[]);
  cads=ld('crm3_cads',[]);
  ccads=ld('crm3_ccads',[]);
  if(!accts.length && !ld('crm3_seeded',false)){
    accts=SEEDS.map(function(s){
      return Object.assign({},s,{id:uid(),acv:Number(s.acv)||0,products:[],contacts:[{id:uid(),name:'',title:'',email:'',phone:'',linkedin:'',isPrimary:true}],winReason:'',lossReason:'',createdAt:Date.now()});
    });
    sv('crm3_accts',accts);
    sv('crm3_seeded',true);
  }
}
function saveA(){sv('crm3_accts',accts);}
function saveActs(){sv('crm3_acts',acts);}
function saveCads(){sv('crm3_cads',cads);}
function saveCcads(){sv('crm3_ccads',ccads);}
function getA(id){return accts.filter(function(a){return a.id===id;})[0]||null;}
function getActs(aid){return acts.filter(function(a){return a.accountId===aid;}).sort(function(a,b){return b.ts-a.ts;});}
function getCad(aid){return cads.filter(function(c){return c.accountId===aid;})[0]||null;}
function getDoneSt(aid){var c=getCad(aid);return c&&c.done?c.done:[];}
function daysSinceAct(aid){var a=acts.filter(function(x){return x.accountId===aid;});if(!a.length)return null;var last=Math.max.apply(null,a.map(function(x){return x.ts;}));return Math.floor((Date.now()-last)/86400000);}
function isStale(a){var d=daysSinceAct(a.id);return d!==null&&d>7&&["Closed Won","Closed Lost","Target"].indexOf(a.stage)===-1;}

// ─── NAVIGATION ──────────────────────────────────────────
function nav(v,aid){
  vw=v;
  curAcct=aid?getA(aid):null;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  var nb=document.getElementById('nb-'+v);
  if(nb) nb.classList.add('on');
  render();
  document.getElementById('view').scrollTop=0;
}
function openAcct(id){
  curAcct=getA(id);
  vw='acct';
  acctTab='overview';
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  render();
  document.getElementById('view').scrollTop=0;
}

// ─── MODALS ──────────────────────────────────────────────
function openM(html){
  var bg=document.createElement('div');
  bg.className='mbg';
  bg.innerHTML='<div class="modal fade">'+html+'</div>';
  bg.addEventListener('click',function(e){if(e.target===bg)closeM();});
  document.body.appendChild(bg);
  mstack.push(bg);
}
function closeM(){if(mstack.length){mstack.pop().remove();}}
function closeAM(){mstack.forEach(function(m){m.remove();});mstack=[];}

// ─── HELPERS ─────────────────────────────────────────────
function fm(n){return '$'+(Number(n)||0).toLocaleString();}
function fk(n){return '$'+Math.round((Number(n)||0)/1000)+'K';}
function sc(stage){var c=SC[stage]||'#334155';return '<span class="badge" style="background:'+c+'33;color:'+c+'">'+stage+'</span>';}
function td(tier){return '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+(TC[tier]||'#6b7280')+';flex-shrink:0"></span>';}
function pb(hcm){return(hcm||'').toLowerCase().indexOf('paychex')>-1?'<span class="badge" style="background:#78350f;color:#fde68a;font-size:9px">PAYCHEX</span>':'';}
function donut(pct,color,lbl,sz){
  sz=sz||62;var r=24,ci=2*Math.PI*r,f=Math.min(pct/100,1)*ci;
  return '<div style="display:flex;flex-direction:column;align-items:center;gap:3px"><svg width="'+sz+'" height="'+sz+'" viewBox="0 0 62 62"><circle cx="31" cy="31" r="'+r+'" fill="none" stroke="#1a2744" stroke-width="5"/><circle cx="31" cy="31" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="5" stroke-dasharray="'+f+' '+(ci-f)+'" stroke-linecap="round" transform="rotate(-90 31 31)"/><text x="31" y="35" text-anchor="middle" fill="#f1f5f9" font-size="10" font-weight="700" font-family="Outfit">'+Math.round(pct)+'%</text></svg>'+(lbl?'<span style="font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em">'+lbl+'</span>':'')+'</div>';
}
function mbar(val,max,col){var p=Math.min((val/Math.max(max,1))*100,100);return '<div class="barw"><div class="barf" style="width:'+p+'%;background:'+col+'"></div></div>';}
function spark(vals,col,w,h){
  col=col||'#2563eb';w=w||120;h=h||32;
  if(!vals||vals.length<2)return '<div style="width:'+w+'px;height:'+h+'px;background:#0a1220;border-radius:4px"></div>';
  var mx=Math.max.apply(null,vals)||1,mn=Math.min.apply(null,vals),rng=mx-mn||1;
  var pts=vals.map(function(v,i){return ((i/(vals.length-1))*w).toFixed(1)+','+(h-((v-mn)/rng)*(h-6)-3).toFixed(1);}).join(' ');
  return '<svg width="'+w+'" height="'+h+'"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function copyTxt(txt,btnId){
  var btn=document.getElementById(btnId);
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){if(btn){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy';},2000);}});}
  else{var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();if(btn){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy';},2000);}}
}
</script>

// ─── QUEUE ───────────────────────────────────────────────
function rQueue(){
  var today=[];
  var upcoming=[];
  accts.forEach(function(acct){
    var cad=getCad(acct.id);
    if(!cad||!cad.start)return;
    var dss=Math.floor((Date.now()-cad.start)/86400000);
    var done=new Set(cad.done||[]);
    var steps=cad.steps||DEF_CAD;
    steps.forEach(function(step){
      var key=step.day+'-'+step.type;
      if(done.has(key))return;
      var du=step.day-1-dss;
      if(du<=0&&du>=-2)today.push({acct:acct,step:step,key:key,overdue:du<0,od:Math.abs(du)});
      else if(du>0&&du<=3)upcoming.push({acct:acct,step:step,key:key,du:du});
    });
  });
  today.sort(function(a,b){if(a.overdue&&!b.overdue)return -1;if(!a.overdue&&b.overdue)return 1;return a.acct.tier-b.acct.tier;});

  var html='<div class="ph"><span class="pt">Daily Queue</span><button class="btn bp" style="font-size:11px;padding:7px 12px" onclick="showEnroll()">+ Enroll</button></div>';
  html+='<div style="font-size:11px;color:#475569;margin-bottom:14px">'+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})+'</div>';

  if(!today.length){
    html+='<div class="card" style="text-align:center;padding:28px"><div style="font-size:28px;margin-bottom:8px">&#10003;</div><div style="font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:4px">Queue clear!</div><div style="font-size:11px;color:#475569">Enroll accounts in cadences to build your daily list.</div></div>';
  } else {
    html+='<div class="sl">Today\'s Actions ('+today.length+')</div>';

      html+='<div class="qi">';
      html+='<div style="font-size:17px">'+( AI[item.step.type]||'📋')+'</div>';

      html+='<div style="font-size:11px;font-weight:600;color:'+(AC[item.step.type]||'#475569')+'">'+esc(item.step.label)+'</div>';
      html+='<div style="font-size:10px;color:#475569;margin-top:2px">'+esc(item.step.desc.slice(0,60))+'...</div>';
      if(item.overdue)html+='<div style="font-size:9px;color:#ef4444;font-weight:700;margin-top:2px">'+item.od+'d overdue</div>';
      html+='</div>';
      html+='<div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">';
      html+='<button class="btn bs" style="font-size:11px;padding:5px 9px" onclick="doneStep(\''+item.acct.id+'\',\''+item.key+'\',\''+esc(item.step.label)+'\')">Done</button>';
      html+='<button class="btn bg" style="font-size:11px;padding:5px 9px" onclick="openAcct(\''+item.acct.id+'\')">View</button>';
      html+='</div></div>';
    });
  }

  if(upcoming.length){
    html+='<div class="sl" style="margin-top:14px">Coming Up (3 Days)</div>';
    upcoming.forEach(function(item){
      html+='<div class="qi" style="opacity:.6"><div style="font-size:17px">'+( AI[item.step.type]||'📋')+'</div><div style="flex:1"><div style="font-size:12px;font-weight:600;color:#94a3b8">'+esc(item.acct.company)+'</div><div style="font-size:10px;color:#475569">'+esc(item.step.label)+'</div></div><span style="font-size:10px;color:#475569">in '+item.du+'d</span></div>';
    });
  }

  html+='<div class="sl" style="margin-top:14px">Active Cadences ('+cads.length+')</div>';

    var a=getA(cad.accountId);if(!a)return;

    html+='<div class="row" onclick="openAcct(\''+a.id+'\')">';

    html+='<div style="font-size:10px;color:#475569">Day '+(dss+1)+' of 30 &bull; '+done+'/'+steps.length+' steps</div>';

    html+='<button class="btn bd" style="font-size:11px;padding:5px 9px;flex-shrink:0" onclick="event.stopPropagation();removeCad(\''+a.id+'\')">Remove</button></div>';
  });

  html+='<div class="sl" style="margin-top:14px">Custom Cadences</div>';
  html+='<button class="btn bo bw" style="margin-bottom:8px" onclick="showCadBuilder()">+ Build New Cadence</button>';
  if(!ccads.length)html+='<p style="font-size:11px;color:#334155">No custom cadences yet.</p>';
  ccads.forEach(function(c){
    html+='<div class="row"><div style="flex:1"><div style="font-size:13px;font-weight:600;color:#f1f5f9">'+esc(c.name)+'</div><div style="font-size:10px;color:#475569">'+c.steps.length+' steps'+(c.desc?' &bull; '+esc(c.desc):'')+'</div></div>';
    html+='<button class="btn bd" style="font-size:11px;padding:5px 9px" onclick="event.stopPropagation();delCcad(\''+c.id+'\')">Delete</button></div>';

  return html;
}

function doneStep(aid,key,label){
  var note=prompt('Note for "'+label+'" (optional):')||label;
  var cad=getCad(aid);
  if(!cad){cad={id:uid(),accountId:aid,start:Date.now(),done:[],steps:null};cads.push(cad);}
  if(!cad.done)cad.done=[];
  cad.done.push(key);
  saveCads();
  acts.push({id:uid(),accountId:aid,type:key.split('-')[1]||'note',text:note,ts:Date.now(),date:new Date().toLocaleDateString(),ck:key});
  saveActs();
  render();
}
function removeCad(aid){if(!confirm('Remove from cadence?'))return;cads=cads.filter(function(c){return c.accountId!==aid;});saveCads();render();}
function delCcad(id){if(!confirm('Delete cadence?'))return;ccads=ccads.filter(function(c){return c.id!==id;});saveCcads();render();}

function showEnroll(){
  var notIn=accts.filter(function(a){return !getCad(a.id)&&a.stage!=='Closed Won'&&a.stage!=='Closed Lost';});
  var opts='<option value="">Choose account...</option>'+notIn.sort(function(a,b){return a.tier-b.tier||(a.company>b.company?1:-1);}).map(function(a){return '<option value="'+a.id+'">[T'+a.tier+'] '+esc(a.company)+'</option>';}).join('');
  var cOpts='<option value="default">Standard 30-Day (11 touches)</option>'+ccads.map(function(c){return '<option value="'+c.id+'">'+esc(c.name)+'</option>';}).join('');
  openM('<div class="mh"><h3>Enroll in Cadence</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb"><div class="fld"><label>Account</label><select class="sel" id="ea">'+opts+'</select></div><div class="fld"><label>Cadence</label><select class="sel" id="ec">'+cOpts+'</select></div><div class="fld"><label>Start Date</label><input class="inp" type="date" id="ed" value="'+new Date().toISOString().split("T")[0]+'"/></div><button class="btn bp bw" onclick="doEnroll()">Start Cadence</button></div>');
}
function doEnroll(){
  var aid=document.getElementById('ea').value;
  var cid=document.getElementById('ec').value;
  var ds=document.getElementById('ed').value;
  if(!aid){alert('Select an account.');return;}
  var start=ds?new Date(ds).getTime():Date.now();
  var steps=null;
  if(cid!=='default'){var cc=ccads.filter(function(c){return c.id===cid;})[0];if(cc)steps=cc.steps;}
  cads=cads.filter(function(c){return c.accountId!==aid;});
  cads.push({id:uid(),accountId:aid,start:start,done:[],steps:steps});
  saveCads();closeM();render();
}

var cbCount=0;
function showCadBuilder(){
  cbCount=1;
  openM('<div class="mh"><h3>Build Cadence</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb"><div class="fld"><label>Name</label><input class="inp" id="cn" placeholder="e.g. Healthcare 45-Day"/></div><div class="fld"><label>Description</label><input class="inp" id="cd" placeholder="When to use this..."/></div><div id="csteps">'+cbStep(0)+'</div><button class="btn bg bw" style="margin-bottom:10px" onclick="addCbStep()">+ Add Step</button><button class="btn bp bw" onclick="saveCad()">Save Cadence</button></div>');
}
function cbStep(i){
  return '<div class="card" style="margin-bottom:8px" id="cbs'+i+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:10px;font-weight:700;color:#475569">STEP '+(i+1)+'</span>'+(i>0?'<button class="btn bd" style="font-size:10px;padding:3px 8px" onclick="rmCbStep('+i+')">Remove</button>':'')+'</div><div class="g2"><div class="fld"><label>Day</label><input class="inp" id="cbd'+i+'" type="number" value="'+(i===0?1:i+1)+'" min="1" max="90"/></div><div class="fld"><label>Type</label><select class="sel" id="cbt'+i+'"><option value="call">Call</option><option value="email">Email</option><option value="drop">Drop</option><option value="linkedin">LinkedIn</option><option value="meeting">Meeting</option></select></div></div><div class="fld"><label>Label</label><input class="inp" id="cbl'+i+'" placeholder="Step name"/></div><div class="fld"><label>Instructions</label><textarea class="tex" id="cbi'+i+'" style="min-height:50px" placeholder="What to do or say..."></textarea></div></div>';
}
function addCbStep(){var c=document.getElementById('csteps');var i=c.querySelectorAll('[id^=cbs]').length;c.insertAdjacentHTML('beforeend',cbStep(i));}
function rmCbStep(i){var el=document.getElementById('cbs'+i);if(el)el.remove();}
function saveCad(){
  var name=document.getElementById('cn').value.trim();
  if(!name){alert('Enter a name.');return;}
  var desc=document.getElementById('cd').value.trim();
  var els=document.getElementById('csteps').querySelectorAll('[id^=cbs]');
  var steps=[];
  els.forEach(function(el){
    var i=el.id.replace('cbs','');
    steps.push({day:parseInt(document.getElementById('cbd'+i).value)||1,type:document.getElementById('cbt'+i).value||'call',label:document.getElementById('cbl'+i).value||'Step',desc:document.getElementById('cbi'+i).value||''});
  });
  if(!steps.length){alert('Add at least one step.');return;}
  ccads.push({id:uid(),name:name,desc:desc,steps:steps,createdAt:Date.now()});
  saveCcads();closeM();render();
}

function rScripts(a){
  var isP=(a.hcm||'').toLowerCase().indexOf('paychex')>-1;
  var s1='Hey [Name], this is Anthony with ADP -- did I catch you at a bad time?\n\n'+(isP?'Quick reason I am calling -- I cover mid-size companies in Rochester and I noticed '+a.company+' is on Paychex. 3 out of 4 companies I talk to on Paychex tell me the same two things: service falls off after year one, and they are managing payroll and HR across too many systems.':'Quick reason I am calling -- I work with '+a.vertical.toLowerCase()+' companies in Rochester in the 50 to 200 employee range and specialize in helping them streamline HR and payroll.')+'\n\nI have time Thursday or Friday this week -- which works better?';
  var s2='Hi [Name], Anthony from ADP, my number is [your number]. I work specifically with '+a.vertical.toLowerCase()+' companies in Rochester in the 50 to 200 employee range.\n\n'+(isP?'I noticed '+a.company+' is on Paychex and wanted to see if a conversation makes sense.':'I have been helping similar companies streamline their payroll and HR setup.')+'\n\nGive me a call back or I will try you again [day]. Thanks [Name].';
  var s3='1. Quick question about '+a.company+'s HR setup\n2. '+(isP?'Paychex alternative -- worth 20 min?':'ADP -- worth 20 min?')+'\n3. How a similar '+a.vertical+' company cut HR admin by 40%\n4. Stopped by today -- '+a.company+'\n5. Compliance update for '+a.vertical.toLowerCase()+' companies';
  var s4='1. Walk me through your current payroll process from start to finish.\n2. Who handles HR today -- is that their full-time role?\n3. How many different systems are employees logging into for HR, benefits, and time?\n4. What would you change about your current setup if you could?\n'+(isP?'5. How long have you been with Paychex -- and when does your contract come up?\n6. When you have a payroll issue, who do you call?':'5. How are you handling ACA compliance and year-end reporting?');
  var s5='We are happy with what we have\n-- Happy is great. My job is not to convince you something is broken. It is to show you what you might be missing. Can I get 20 minutes?\n\nNot the right time\n-- When would be? What would need to change to make it relevant?\n\nJust send me info\n-- I would rather not send a generic brochure. Can I ask two quick questions first?\n\nToo expensive\n-- Compared to what? Most companies find the cost is offset in year one by reduced admin time and lower insurance. Let me show you the math.\n\n'+(isP?'We just renewed with Paychex\n-- Perfect timing. Most contracts have a 30-day window for competitive review. When does yours come up? I will have a comparison ready before then.':'');
  var s6='Hi [Name] -- I work with '+a.vertical.toLowerCase()+' companies in Rochester on HR and payroll. I have been helping similar orgs your size '+(isP?'move off Paychex':'simplify their setup')+' and thought it worth connecting. No pitch -- just felt it might be relevant.';

  var scripts=[['Cold Call Opener','📞',s1,'s1'],['Voicemail','📱',s2,'s2'],['Email Subject Lines','📧',s3,'s3'],['Discovery Questions','🔍',s4,'s4'],['Objection Handlers','🛡️',s5,'s5'],['LinkedIn DM','💼',s6,'s6']];
  var html='';
  scripts.forEach(function(sc2){
    var key='scr_'+sc2[3];
    html+='<div class="card" style="margin-bottom:10px">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:12px;font-weight:700;color:#f1f5f9">'+sc2[0]+' '+sc2[1]+'</div>';
    html+='<button id="'+key+'" class="btn bg" style="font-size:11px;padding:5px 10px" onclick="copyTxt('+JSON.stringify(sc2[2])+'\''+key+'\')">Copy</button></div>';
    html+='<div style="font-size:11px;color:#94a3b8;line-height:1.75;white-space:pre-wrap;background:#0a1220;border-radius:7px;padding:10px">'+esc(sc2[2])+'</div></div>';
  });
  return html;
}

function quickEnroll(aid){
  cads=cads.filter(function(c){return c.accountId!==aid;});
  cads.push({id:uid(),accountId:aid,start:Date.now(),done:[],steps:null});
  saveCads();render();
}

<script>
// ─── PLAYBOOKS ───────────────────────────────────────────
var PB={
  paychex:{title:'Paychex Displacement',color:'#ef4444',secs:[
    {h:'Why Companies Leave Paychex',b:'1. Poor service after year one -- call center, not a rep\n2. Tax filing errors with slow resolution\n3. No in-house 401k -- they resell third-party retirement plans\n4. Limited integration with modern HRIS and ERP systems\n5. Clunky reporting requiring manual exports\n6. ACA compliance support is reactive not proactive\n7. No true HR advisory layer -- just payroll processing\n8. Price increases at renewal with no added value'},
    {h:'Discovery Questions',b:'"How long have you been with Paychex?"\n"Who do you call when there is a payroll error?"\n"How many different logins do employees use across HR, benefits, and time?"\n"Walk me through open enrollment for your team."\n"If you could change one thing about your current setup, what would it be?"\n"Are you getting proactive compliance updates?"\n"How are you handling ACA tracking and reporting?"'},
    {h:'Objection Handlers',b:'"We just re-signed"\nPerfect timing. Most contracts have a 30-day window at renewal for competitive review. When does yours come up?\n\n"Paychex is cheaper"\nCheaper base rate yes. But what is the cost of a tax filing error? Let me show you total cost of ownership.\n\n"Do not want the switch hassle"\nADP implementation handles the entire migration. Most clients live in 60 days, zero payroll disruption.\n\n"Our rep is great"\nWhat happens when they leave? ADP gives you a dedicated team not just one rep.'},
    {h:'Competitive Landmines',b:'"Does your provider notify you proactively when a new labor law affects your industry?"\n"When was the last time your rep reached out with a recommendation?"\n"Do you have a dedicated implementation person or did you go to a call center after signing?"\n"How does your provider handle multi-state compliance if you hire outside NY?"'},
  ]},
  totalsource:{title:'TotalSource (PEO)',color:'#2563eb',secs:[
    {h:'What Is TotalSource?',b:'ADP TotalSource is a Professional Employer Organization. The employer co-employs their workforce with ADP, gaining Fortune 500-level benefits, workers comp, and HR support at SMB pricing.\n\nBest fit: 50-249 employees. Strongest in manufacturing, healthcare, hospitality, and construction.'},
    {h:'Value Props',b:'1. Fortune 500 benefits pool -- rates small businesses cannot get alone\n2. Workers Comp Pay-by-Pay -- no large deposits, no audits\n3. Employment Practices Liability protection\n4. Dedicated HR Business Partner on staff\n5. ACA compliance fully managed\n6. Unemployment claims management\n7. Onboarding, offboarding, I-9 compliance handled'},
    {h:'Ideal Triggers',b:'- Owner or office manager doing HR themselves\n- Company recently had OSHA incident or employment lawsuit\n- High turnover in manufacturing or hospitality\n- Struggling to offer competitive benefits\n- No dedicated HR person on staff\n- Workers comp audit coming up\n- Recent rapid growth (20 or more hires in 12 months)'},
    {h:'Discovery Questions',b:'"Who handles HR today -- is that their full-time role?"\n"How much did your health insurance rate go up this year?"\n"Have you had any employment-related claims in the last 3 years?"\n"Are you paying workers comp annually or monthly?"\n"When a manager has an HR question, who do they call?"\n"If you could hire an HR director for 1500 a month, would that be valuable?"'},
    {h:'Objection Handlers',b:'"We do not want to share our employees"\nCo-employment is a legal structure not operational. Your employees stay on your floor. You manage them day-to-day. Only the admin behind the scenes changes.\n\n"We already have benefits"\nWhat is your per-employee cost? Most companies see a 15-20 percent reduction through TotalSource risk pool.\n\n"We are too small"\n50-249 is our sweet spot. Big enough to have real HR risk, not big enough for a full in-house HR team.'},
  ]},
  retirement:{title:'Retirement and 401k',color:'#10b981',secs:[
    {h:'Overview',b:'ADP Retirement Services provides full 401k plan administration: recordkeeping, compliance testing, 5500 filing, participant education, and investment management -- all integrated with payroll. Zero manual data entry.'},
    {h:'Key Value Props',b:'1. Fully integrated with ADP payroll -- contributions flow automatically\n2. Fiduciary support -- reduces employer liability\n3. Auto-enrollment and auto-escalation features\n4. Roth 401k, Safe Harbor, and SIMPLE IRA options\n5. Employee mobile app for investments\n6. SECURE Act 2.0 fully supported'},
    {h:'Discovery Questions',b:'"Do you currently offer a 401k?"\n"How does your 401k sync with payroll -- is it manual?"\n"When did you last review your plan for SECURE Act 2.0 compliance?"\n"What is your current employee participation rate?"\n"Have you done a fee benchmarking analysis recently?"'},
    {h:'Objection Handlers',b:'"We use our bank or local advisor"\nDo your payroll and 401k talk automatically? With ADP contributions post the same day payroll runs. No exports, no reconciliation errors.\n\n"Our plan is fine"\nWhen was the last compliance test? SECURE Act 2.0 added requirements most small plans are not aligned with. I can do a free review.'},
  ]},
  insurance:{title:'Insurance and Workers Comp',color:'#a855f7',secs:[
    {h:'Pay-by-Pay Workers Comp',b:'Instead of a large annual premium upfront, clients pay per payroll based on actual wages.\n\nBenefits:\n- Eliminates large deposits and frees cash flow\n- No year-end audit surprises\n- Premium auto-adjusts to actual payroll\n\nBest fit: manufacturing, construction, hospitality, home services\n\nTrigger question: Do you pay a large lump sum for workers comp each year?'},
    {h:'Discovery Questions',b:'"Walk me through your workers comp renewal -- annual or monthly?"\n"Have you had any workplace injuries in the last 3 years?"\n"What carrier are you with for health insurance? When did you last go out to bid?"\n"Does your broker do a market analysis at renewal or just renew in place?"\n"Are your benefits, workers comp, and payroll all with different vendors?"'},
    {h:'Objection Handlers',b:'"We have a broker we have used for years"\nADP can work alongside your broker. But Pay-by-Pay workers comp integrates with payroll in a way a standalone carrier cannot match.\n\n"Our rates are fine"\nWhen did your broker last run a full market comparison? The SMB health insurance market has shifted significantly in the last 18 months.'},
  ]},
  scripts:{title:'Cold Call Scripts',color:'#f59e0b',secs:[
    {h:'Universal Framework',b:'Pattern: Pattern Interrupt, Reason for Call, Permission Question, Value Hook, Meeting Ask\n\nKeep it under 45 seconds. Goal is to get the meeting not explain ADP.'},
    {h:'Script 1: Paychex Target',b:'"Hey [Name], this is Anthony with ADP -- did I catch you at a bad time?\n\nQuick reason I am calling -- I cover mid-size companies in Rochester and I noticed you are on Paychex. 3 out of 4 companies I talk to on Paychex tell me the same two things: service falls off after year one, and they are managing payroll and HR across too many systems.\n\nIf that resonates at all it is worth a 20-minute conversation. I have time Thursday or Friday -- which works better?"'},
    {h:'Script 2: HR Pain',b:'"Hi [Name], Anthony from ADP -- quick question before I let you go.\n\nI work with companies in Rochester in the 50 to 200 employee range. The pattern I keep seeing is owners spending 8 to 10 hours a week on payroll, HR issues, and compliance that should be automated. Is that something you are dealing with?\n\nIf it is I would love to show you what a few companies in your vertical have done to cut that in half. Can we grab 20 minutes this week?"'},
    {h:'Script 3: Drop Follow-Up',b:'"Hi [Name], Anthony from ADP -- I actually stopped by your office yesterday and left something with your receptionist.\n\nI work with companies in Rochester in the 50 to 200 employee range and had a feeling it might be relevant.\n\nDo you have 20 minutes this week just to see if it makes sense?"'},
    {h:'Voicemail Template',b:'"Hi [Name], this is Anthony from ADP, my number is [number]. I work specifically with companies in Rochester in the 50 to 250 employee range.\n\nMost companies I talk to are managing payroll, HR, and benefits across 3 or 4 different systems and I specialize in showing them how to simplify that and save money.\n\nIf that sounds relevant call me back or I will try you again [day]. Thanks [Name]."'},
    {h:'Gatekeeper Tactics',b:'Receptionist:\n"Hi, this is Anthony from ADP -- hoping to catch [Name] for just a moment. Is she typically available mornings or afternoons?"\n\nIf asked what it is about:\n"It is regarding their HR and payroll setup -- I work with similar companies in the area."\n\nIf told to email:\n"Absolutely, I will send something. Can you confirm her email? And the best direct number if she wants to follow up?"'},
  ]},
};

function rPlays(){
  var pb=PB[pbKey];
  var html='<div class="ph"><span class="pt">Playbooks</span></div>';
  html+='<div class="prow" style="margin-bottom:14px">';
  Object.keys(PB).forEach(function(k){
    html+='<button class="pill'+(pbKey===k?' on':'')+'" style="'+(pbKey===k?'border-color:'+PB[k].color+';color:'+PB[k].color:'')+'" onclick="pbKey=\''+k+'\';render()">'+PB[k].title+'</button>';
  });
  html+='</div><div class="card"><div style="font-size:15px;font-weight:800;color:'+pb.color+';margin-bottom:14px">'+pb.title+'</div>';
  pb.secs.forEach(function(sec){
    html+='<div class="pbs"><h4 style="border-color:'+pb.color+'">'+esc(sec.h)+'</h4><div class="pbb">'+esc(sec.b)+'</div></div>';
  });
  html+='</div>';
  return html;
}

// ─── REPORT ──────────────────────────────────────────────
function rReport(){
  var won=accts.filter(function(a){return a.stage==='Closed Won';});
  var lost=accts.filter(function(a){return a.stage==='Closed Lost';});
  var logos=won.length,rev=won.reduce(function(s,a){return s+(Number(a.acv)||0);},0);
  var active=accts.filter(function(a){return ['Target','Prospecting','Closed Won','Closed Lost'].indexOf(a.stage)===-1;});
  var pipeVal=active.reduce(function(s,a){return s+(Number(a.acv)||0);},0);
  var mtgs=acts.filter(function(a){return a.type==='meeting'||a.type==='demo';}).length;
  var calls=acts.filter(function(a){return a.type==='call';}).length;
  var emails2=acts.filter(function(a){return a.type==='email';}).length;
  var drops=acts.filter(function(a){return a.type==='drop';}).length;
  var wr=won.length+lost.length>0?Math.round((won.length/(won.length+lost.length))*100):0;
  var avgD=logos>0?Math.round(rev/logos):0;
  var wk=604800000,now2=Date.now();
  var wActs=acts.filter(function(a){return a.ts>=now2-wk;});
  var wCalls=wActs.filter(function(a){return a.type==='call';}).length;
  var wEmails=wActs.filter(function(a){return a.type==='email';}).length;
  var wMtgs=wActs.filter(function(a){return a.type==='meeting'||a.type==='demo';}).length;
  var wDrops=wActs.filter(function(a){return a.type==='drop';}).length;
  var byStage2=STAGES.map(function(s){return {s:s,n:accts.filter(function(a){return a.stage===s;}).length,v:accts.filter(function(a){return a.stage===s;}).reduce(function(x,a){return x+(Number(a.acv)||0);},0)};}).filter(function(x){return x.n>0;});
  var mxN=Math.max.apply(null,byStage2.map(function(x){return x.n;}))||1;
  var topDeals=accts.filter(function(a){return ['Target','Prospecting','Closed Lost'].indexOf(a.stage)===-1;}).sort(function(a,b){return (Number(b.acv)||0)-(Number(a.acv)||0);}).slice(0,5);
  var byProd=PRODS.map(function(p){return {p:p,n:accts.filter(function(a){return (a.products||[]).indexOf(p)>-1;}).length};}).filter(function(x){return x.n>0;}).sort(function(a,b){return b.n-a.n;});
  var stales2=accts.filter(isStale);
  var dateStr=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  var lp=Math.min((logos/6)*100,100);
  var rp=Math.min((rev/150000)*100,100);

  var wkEmail='Subject: Weekly Sales Update - Rochester Territory - '+dateStr+'\n\nHi [Manager],\n\nHere is my update for the week:\n\nQUOTA PROGRESS\n- Logos Closed: '+logos+' / 6\n- Revenue Closed: '+fm(rev)+' / $150,000\n- Pipeline Value: '+fm(pipeVal)+'\n\nACTIVITY THIS WEEK\n- Calls: '+wCalls+'\n- Emails: '+wEmails+'\n- Drops: '+wDrops+'\n- Meetings and Demos: '+wMtgs+'\n\nDEALS IN PROGRESS ('+active.length+' active)\n'+active.slice(0,5).map(function(a){return '- '+a.company+' | '+a.stage+' | '+fm(a.acv);}).join('\n')+(active.length>5?'\n...and '+(active.length-5)+' more':'')+'\n\n'+(stales2.length?'NEEDS ATTENTION\n'+stales2.map(function(a){return '- '+a.company+' | '+a.stage+' | '+daysSinceAct(a.id)+'d since last activity';}).join('\n')+'\n\n':'')+'FOCUS NEXT WEEK\n- Continue Tier 1 outreach ('+accts.filter(function(a){return a.tier===1&&a.stage==='Target';}).length+' targets remaining)\n- Follow up on active pipeline\n- Complete pending cadence steps\n\nAnthony';
  window._wkEmail=wkEmail;

  var html='<div class="ph"><span class="pt">Report</span></div>';
  html+='<div class="hero"><div style="font-size:9px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">FY Quota &bull; 6 Logos &bull; $150K ARR</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">';
  html+='<div style="text-align:center">'+donut(lp,'#2563eb','Logos',68)+'<div style="font-size:20px;font-weight:800;color:#2563eb;margin-top:4px">'+logos+' <span style="font-size:12px;color:#334155">/ 6</span></div></div>';
  html+='<div style="text-align:center">'+donut(rp,'#10b981','Revenue',68)+'<div style="font-size:20px;font-weight:800;color:#10b981;margin-top:4px">'+fk(rev)+' <span style="font-size:12px;color:#334155">/ $150K</span></div></div>';
  html+='</div><div class="barw" style="height:8px"><div class="barf" style="width:'+rp+'%;background:linear-gradient(90deg,#2563eb,#10b981)"></div></div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:9px;color:#1a2744;margin-top:3px"><span>$0</span><span>$75K</span><span>$150K</span></div></div>';

  html+='<div class="card"><div class="sl rs">All-Time Metrics</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  [['Calls Made',calls,'#10b981'],['Emails Sent',emails2,'#2563eb'],['Drops Made',drops,'#f97316'],['Meetings',mtgs,'#a855f7'],['Win Rate',wr+'%','#10b981'],['Avg Deal',fm(avgD),'#f59e0b']].forEach(function(k){
    html+='<div style="text-align:center;padding:8px;background:#0a1220;border-radius:8px"><div style="font-size:20px;font-weight:800;color:'+k[2]+'">'+k[1]+'</div><div style="font-size:9px;color:#334155;font-weight:700;margin-top:2px">'+k[0]+'</div></div>';
  });
  html+='</div></div>';

  html+='<div class="card"><div class="sl rs" style="border-color:#7c3aed">Pipeline by Stage</div>';
  byStage2.forEach(function(x){
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="font-size:9px;color:#475569;width:75px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+x.s+'</span>'+mbar(x.n,mxN,SC[x.s]||'#334155')+'<span style="font-size:9px;color:#475569;width:14px;text-align:right">'+x.n+'</span>'+(x.v>0?'<span style="font-size:9px;color:#10b981;width:36px;text-align:right">'+fk(x.v)+'</span>':'')+'</div>';
  });
  html+='</div>';

  if(topDeals.length){
    html+='<div class="card"><div class="sl rs" style="border-color:#ef4444">Top Active Deals</div>';
    topDeals.forEach(function(a){
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #060f1e" onclick="openAcct(\''+a.id+'\')">';
      html+='<div><div style="font-size:12px;font-weight:600;color:#f1f5f9">'+esc(a.company)+'</div><div style="font-size:10px;color:#334155">'+a.stage+' &bull; '+esc(a.vertical)+'</div></div>';
      html+='<div style="text-align:right"><div style="font-size:12px;font-weight:700;color:#10b981">'+fm(a.acv)+'</div><div style="font-size:9px;color:'+(TC[a.tier]||'#6b7280')+'">T'+a.tier+'</div></div></div>';
    });
    html+='</div>';
  }

  if(byProd.length){
    html+='<div class="card"><div class="sl rs" style="border-color:#06b6d4">Product Mix</div>';
    byProd.forEach(function(x){
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="font-size:10px;color:#64748b;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(x.p)+'</span>'+mbar(x.n,byProd[0].n,'#06b6d4')+'<span style="font-size:9px;color:#475569;width:14px;text-align:right">'+x.n+'</span></div>';
    });
    html+='</div>';
  }

  html+='<div class="card"><div class="sl rs" style="border-color:#15803d">Win / Loss</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">';
  html+='<div style="text-align:center;padding:12px;background:#14532d22;border-radius:8px"><div style="font-size:26px;font-weight:800;color:#86efac">'+won.length+'</div><div style="font-size:9px;color:#334155;font-weight:700">WON</div></div>';
  html+='<div style="text-align:center;padding:12px;background:#7f1d1d22;border-radius:8px"><div style="font-size:26px;font-weight:800;color:#fca5a5">'+lost.length+'</div><div style="font-size:9px;color:#334155;font-weight:700">LOST</div></div></div>';
  won.filter(function(a){return a.winReason;}).forEach(function(a){html+='<div style="font-size:10px;color:#86efac;margin-bottom:3px">&#10003; '+esc(a.company)+': '+esc(a.winReason)+'</div>';});
  lost.filter(function(a){return a.lossReason;}).forEach(function(a){html+='<div style="font-size:10px;color:#fca5a5;margin-bottom:3px">&#10007; '+esc(a.company)+': '+esc(a.lossReason)+'</div>';});
  html+='</div>';

  html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="sl rs" style="margin:0">Weekly Manager Email</div><button id="cpyBtn" class="btn bp" style="font-size:11px;padding:6px 11px" onclick="copyWkEmail()">Copy Email</button></div>';
  html+='<div style="font-size:9px;color:#475569;margin-bottom:8px">Week of '+dateStr+'</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px">';
  [['Calls',wCalls,'#10b981'],['Emails',wEmails,'#2563eb'],['Drops',wDrops,'#f97316'],['Meetings',wMtgs,'#a855f7']].forEach(function(k){
    html+='<div style="padding:8px;background:#0a1220;border-radius:7px;text-align:center"><div style="font-size:17px;font-weight:800;color:'+k[2]+'">'+k[1]+'</div><div style="font-size:9px;color:#334155;font-weight:700">'+k[0]+' This Week</div></div>';
  });
  html+='</div>';
  html+='<div style="background:#0a1220;border-radius:7px;padding:12px;font-size:11px;color:#94a3b8;line-height:1.7;white-space:pre-wrap;max-height:200px;overflow-y:auto">'+esc(wkEmail)+'</div>';
  html+='<div id="cpyConfirm" style="display:none;text-align:center;padding:6px;font-size:11px;color:#10b981;font-weight:700;margin-top:6px">Copied to clipboard!</div></div>';
  return html;
}

function copyWkEmail(){
  var txt=window._wkEmail||'';
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){document.getElementById('cpyConfirm').style.display='block';setTimeout(function(){var el=document.getElementById('cpyConfirm');if(el)el.style.display='none';},3000);});}
  else{var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();document.getElementById('cpyConfirm').style.display='block';setTimeout(function(){var el=document.getElementById('cpyConfirm');if(el)el.style.display='none';},3000);}
}
</script>

<script>
// ─── MODALS: ADD/EDIT ACCOUNT ─────────────────────────────
function showAddAcct(){
  afProds=[];
  var vOpts=VERTS.map(function(v){return '<option>'+v+'</option>';}).join('');
  var sOpts=STAGES.map(function(s){return '<option>'+s+'</option>';}).join('');
  var pBtns=PRODS.map(function(p){return '<button type="button" class="pill" onclick="togProd(this,\''+esc(p)+'\')" data-p="'+esc(p)+'">'+esc(p)+'</button>';}).join('');
  openM('<div class="mh"><h3>Add Account</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb"><div class="fld"><label>Company Name</label><input class="inp" id="af-co" placeholder="Acme Corp"/></div><div class="g2"><div class="fld"><label>Vertical</label><select class="sel" id="af-vt">'+vOpts+'</select></div><div class="fld"><label>Tier</label><select class="sel" id="af-tr"><option value="1">T1 Hot</option><option value="2">T2 Warm</option><option value="3">T3 Cool</option></select></div><div class="fld"><label>Stage</label><select class="sel" id="af-st">'+sOpts+'</select></div><div class="fld"><label>HCM</label><input class="inp" id="af-hcm" value="Paychex"/></div><div class="fld"><label>Employees</label><input class="inp" id="af-emp" type="number" placeholder="100"/></div><div class="fld"><label>ACV ($)</label><input class="inp" id="af-acv" type="number" placeholder="20000"/></div></div><div class="fld"><label>City</label><input class="inp" id="af-ci" value="Rochester"/></div><div class="fld"><label>Notes</label><textarea class="tex" id="af-nt" placeholder="Pain points, decision timeline..."></textarea></div><div style="border-top:1px solid #0a1220;margin:10px 0;padding-top:10px"><div style="font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;margin-bottom:8px">PRIMARY CONTACT</div><div class="g2"><div class="fld"><label>Name</label><input class="inp" id="af-cn" placeholder="Jane Smith"/></div><div class="fld"><label>Title</label><input class="inp" id="af-ct" placeholder="HR Director"/></div><div class="fld"><label>Email</label><input class="inp" id="af-ce" type="email"/></div><div class="fld"><label>Phone</label><input class="inp" id="af-cp"/></div></div><div class="fld"><label>LinkedIn URL</label><input class="inp" id="af-cl" placeholder="https://linkedin.com/in/..."/></div></div><div class="fld"><label>Products in Play</label><div style="display:flex;flex-wrap:wrap;gap:6px">'+pBtns+'</div></div><button class="btn bp bw" onclick="doAddAcct()">Save Account</button></div>');
}

function togProd(btn,prod){
  var i=afProds.indexOf(prod);
  if(i>-1){afProds.splice(i,1);btn.classList.remove('on');}
  else{afProds.push(prod);btn.classList.add('on');}
}

function doAddAcct(){
  var co=document.getElementById('af-co').value.trim();
  if(!co){alert('Company name required.');return;}
  var a={
    id:uid(),company:co,
    vertical:document.getElementById('af-vt').value,
    tier:parseInt(document.getElementById('af-tr').value),
    stage:document.getElementById('af-st').value,
    hcm:document.getElementById('af-hcm').value||'Unknown',
    employees:parseInt(document.getElementById('af-emp').value)||0,
    acv:parseInt(document.getElementById('af-acv').value)||0,
    city:document.getElementById('af-ci').value||'Rochester',
    notes:document.getElementById('af-nt').value,
    products:afProds.slice(),
    contacts:[{id:uid(),name:document.getElementById('af-cn').value,title:document.getElementById('af-ct').value,email:document.getElementById('af-ce').value,phone:document.getElementById('af-cp').value,linkedin:document.getElementById('af-cl').value,isPrimary:true}],
    winReason:'',lossReason:'',createdAt:Date.now()
  };
  accts.push(a);saveA();afProds=[];closeM();render();
}

function showEditAcct(id){
  var a=getA(id);if(!a)return;
  var pri=(a.contacts||[]).filter(function(c){return c.isPrimary;})[0]||(a.contacts||[])[0]||{};
  afProds=(a.products||[]).slice();
  var vOpts=VERTS.map(function(v){return '<option'+(v===a.vertical?' selected':'')+'>'+v+'</option>';}).join('');
  var sOpts=STAGES.map(function(s){return '<option'+(s===a.stage?' selected':'')+'>'+s+'</option>';}).join('');
  var pBtns=PRODS.map(function(p){return '<button type="button" class="pill'+(afProds.indexOf(p)>-1?' on':'')+'" onclick="togProd(this,\''+esc(p)+'\')" data-p="'+esc(p)+'">'+esc(p)+'</button>';}).join('');
  openM('<div class="mh"><h3>Edit Account</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb"><div class="fld"><label>Company</label><input class="inp" id="ef-co" value="'+esc(a.company)+'"/></div><div class="g2"><div class="fld"><label>Vertical</label><select class="sel" id="ef-vt">'+vOpts+'</select></div><div class="fld"><label>Tier</label><select class="sel" id="ef-tr"><option value="1"'+(a.tier===1?' selected':'')+'>T1 Hot</option><option value="2"'+(a.tier===2?' selected':'')+'>T2 Warm</option><option value="3"'+(a.tier===3?' selected':'')+'>T3 Cool</option></select></div><div class="fld"><label>Stage</label><select class="sel" id="ef-st">'+sOpts+'</select></div><div class="fld"><label>HCM</label><input class="inp" id="ef-hcm" value="'+esc(a.hcm||'')+'"/></div><div class="fld"><label>Employees</label><input class="inp" id="ef-emp" type="number" value="'+(a.employees||'')+'"/></div><div class="fld"><label>ACV ($)</label><input class="inp" id="ef-acv" type="number" value="'+(a.acv||'')+'"/></div></div><div class="fld"><label>City</label><input class="inp" id="ef-ci" value="'+esc(a.city||'Rochester')+'"/></div><div class="fld"><label>Notes</label><textarea class="tex" id="ef-nt">'+esc(a.notes||'')+'</textarea></div><div class="fld"><label>Win Reason</label><input class="inp" id="ef-win" value="'+esc(a.winReason||'')+'"/></div><div class="fld"><label>Loss Reason</label><input class="inp" id="ef-loss" value="'+esc(a.lossReason||'')+'"/></div><div class="fld"><label>Products in Play</label><div style="display:flex;flex-wrap:wrap;gap:6px">'+pBtns+'</div></div><div style="border-top:1px solid #0a1220;margin:10px 0;padding-top:10px"><div style="font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;margin-bottom:8px">PRIMARY CONTACT</div><div class="g2"><div class="fld"><label>Name</label><input class="inp" id="ef-cn" value="'+esc(pri.name||'')+'"/></div><div class="fld"><label>Title</label><input class="inp" id="ef-ct" value="'+esc(pri.title||'')+'"/></div><div class="fld"><label>Email</label><input class="inp" id="ef-ce" value="'+esc(pri.email||'')+'"/></div><div class="fld"><label>Phone</label><input class="inp" id="ef-cp" value="'+esc(pri.phone||'')+'"/></div></div><div class="fld"><label>LinkedIn</label><input class="inp" id="ef-cl" value="'+esc(pri.linkedin||'')+'"/></div></div><div style="display:flex;gap:8px"><button class="btn bp" style="flex:1" onclick="doEditAcct(\''+id+'\')">Save Changes</button><button class="btn bd" style="font-size:12px;padding:9px 12px" onclick="doDelAcct(\''+id+'\')">Delete</button></div></div>');
}

function doEditAcct(id){
  var idx=accts.findIndex(function(a){return a.id===id;});if(idx<0)return;
  var a=accts[idx];
  var pri=(a.contacts||[]).filter(function(c){return c.isPrimary;})[0];
  if(!pri){pri={id:uid(),isPrimary:true};if(!a.contacts)a.contacts=[];a.contacts.push(pri);}
  pri.name=document.getElementById('ef-cn').value;
  pri.title=document.getElementById('ef-ct').value;
  pri.email=document.getElementById('ef-ce').value;
  pri.phone=document.getElementById('ef-cp').value;
  pri.linkedin=document.getElementById('ef-cl').value;
  accts[idx]=Object.assign({},a,{
    company:document.getElementById('ef-co').value,
    vertical:document.getElementById('ef-vt').value,
    tier:parseInt(document.getElementById('ef-tr').value),
    stage:document.getElementById('ef-st').value,
    hcm:document.getElementById('ef-hcm').value,
    employees:parseInt(document.getElementById('ef-emp').value)||0,
    acv:parseInt(document.getElementById('ef-acv').value)||0,
    city:document.getElementById('ef-ci').value,
    notes:document.getElementById('ef-nt').value,
    winReason:document.getElementById('ef-win').value,
    lossReason:document.getElementById('ef-loss').value,
    products:afProds.slice()
  });
  curAcct=accts[idx];saveA();afProds=[];closeM();render();
}

function doDelAcct(id){
  if(!confirm('Delete this account? Cannot be undone.'))return;
  accts=accts.filter(function(a){return a.id!==id;});
  acts=acts.filter(function(a){return a.accountId!==id;});
  cads=cads.filter(function(c){return c.accountId!==id;});
  saveA();saveActs();saveCads();
  closeAM();nav('accts');
}

function showAddContact(aid){
  openM('<div class="mh"><h3>Add Contact</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb"><div class="fld"><label>Name</label><input class="inp" id="nc-n" placeholder="Jane Smith"/></div><div class="fld"><label>Title</label><input class="inp" id="nc-t" placeholder="HR Director"/></div><div class="fld"><label>Email</label><input class="inp" id="nc-e" type="email"/></div><div class="fld"><label>Phone</label><input class="inp" id="nc-p"/></div><div class="fld"><label>LinkedIn URL</label><input class="inp" id="nc-l"/></div><button class="btn bp bw" onclick="doAddContact(\''+aid+'\')">Add Contact</button></div>');
}

function doAddContact(aid){
  var idx=accts.findIndex(function(a){return a.id===aid;});if(idx<0)return;
  if(!accts[idx].contacts)accts[idx].contacts=[];
  accts[idx].contacts.push({id:uid(),name:document.getElementById('nc-n').value,title:document.getElementById('nc-t').value,email:document.getElementById('nc-e').value,phone:document.getElementById('nc-p').value,linkedin:document.getElementById('nc-l').value,isPrimary:false});
  curAcct=accts[idx];saveA();closeM();render();
}

function showLogAct(aid){
  var types=Object.keys(AI);
  var btns=types.map(function(t){return '<button type="button" class="pill" id="at-'+t+'" onclick="selActType(\''+t+'\')">'+AI[t]+' '+t+'</button>';}).join('');
  openM('<div class="mh"><h3>Log Activity</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb"><div class="fld"><label>Type</label><div style="display:flex;flex-wrap:wrap;gap:6px">'+btns+'</div><input type="hidden" id="act-type" value="call"/></div><div class="fld"><label>Notes</label><textarea class="tex" id="act-notes" placeholder="What happened? Key takeaways..." style="min-height:90px"></textarea></div><button class="btn bp bw" onclick="doLogAct(\''+aid+'\')">Log Activity</button></div>');
  setTimeout(function(){var el=document.getElementById('at-call');if(el)el.classList.add('on');},50);
}

function selActType(t){
  document.getElementById('act-type').value=t;
  document.querySelectorAll('[id^=at-]').forEach(function(b){b.classList.remove('on');});
  var el=document.getElementById('at-'+t);if(el)el.classList.add('on');
}

function doLogAct(aid){
  var type=document.getElementById('act-type').value;
  var text=document.getElementById('act-notes').value.trim();
  if(!text){alert('Please add a note.');return;}
  acts.push({id:uid(),accountId:aid,type:type,text:text,ts:Date.now(),date:new Date().toLocaleDateString()});
  saveActs();closeM();render();
}

function showSettings(){
  openM('<div class="mh"><h3>Settings</h3><button class="mc" onclick="closeM()">×</button></div><div class="mb"><div class="fld"><label>Your Name</label><input class="inp" id="st-n" value="'+esc(ld('crm3_name','Anthony'))+'"/></div><div class="fld"><label>Manager Name</label><input class="inp" id="st-m" value="'+esc(ld('crm3_mgr',''))+'"/></div><div style="border-top:1px solid #0a1220;margin:14px 0;padding-top:14px"><div style="font-size:11px;color:#f59e0b;font-weight:700;margin-bottom:8px">Data Management</div><button class="btn bg bw" style="margin-bottom:8px" onclick="exportData()">Export All Data (JSON)</button><button class="btn bg bw" onclick="importData()">Import Data (JSON)</button></div><button class="btn bp bw" onclick="doSaveSettings()">Save Settings</button></div>');
}
function doSaveSettings(){sv('crm3_name',document.getElementById('st-n').value);sv('crm3_mgr',document.getElementById('st-m').value);closeM();}

function exportData(){
  var d=JSON.stringify({accts:accts,acts:acts,cads:cads,ccads:ccads,at:new Date().toISOString()},null,2);
  var b=new Blob([d],{type:'application/json'});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');a.href=u;a.download='adp-crm-backup.json';a.click();URL.revokeObjectURL(u);
}
function importData(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(d.accts){accts=d.accts;saveA();}
        if(d.acts){acts=d.acts;saveActs();}
        if(d.cads){cads=d.cads;saveCads();}
        if(d.ccads){ccads=d.ccads;saveCcads();}
        closeM();render();alert('Data imported!');
      }catch(err){alert('Invalid file.');}
    };
    r.readAsText(f);
  };
  inp.click();
}

// ─── MAIN RENDER ─────────────────────────────────────────
function render(){
  var el=document.getElementById('view');
  var html='';
  try{
    if(vw==='acct'&&curAcct){html=rAcct();}
    else if(vw==='dash'){html=rDash();}
    else if(vw==='queue'){html=rQueue();}
    else if(vw==='accts'){html=rAccts();}
    else if(vw==='plays'){html=rPlays();}
    else if(vw==='report'){html=rReport();}
  }catch(e){
    html='<div style="padding:20px;color:#ef4444;font-size:12px"><strong>Error rendering view:</strong><br/>'+e.message+'<br/><br/><button class="btn bp" onclick="vw=\'dash\';render()">Go to Dashboard</button></div>';
    console.error('Render error:',e);
  }
  el.innerHTML='<div class="fade">'+html+'</div>';
}

// ─── BOOT ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  initData();
  render();
});
</script>
